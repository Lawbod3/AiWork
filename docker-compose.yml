services:
  postgres:
    # Using official postgres:16 image for reliability and proper environment variable handling
    image: postgres:16
    container_name: backend-assessment-postgres
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessment_user -d assessment_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
